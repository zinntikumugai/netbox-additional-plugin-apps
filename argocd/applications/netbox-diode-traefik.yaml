---
# クラスタ traefik (kube-system) を netbox-diode NS から参照するための ExternalName Service
# 旧 netbox-diode-ingress-nginx-controller Service の置き換え
# クライアント (netbox / orb-agent) はこの hostname:port を gRPC ターゲットとして使う
apiVersion: v1
kind: Service
metadata:
  name: netbox-diode-ingress
  namespace: netbox-diode
  labels:
    app.kubernetes.io/component: netbox-diode-ingress
    app.kubernetes.io/name: diode
spec:
  type: ExternalName
  externalName: rke2-traefik.kube-system.svc.cluster.local
  ports:
    - name: http
      port: 80
      protocol: TCP
---
# diode の auth introspect を呼び出す ForwardAuth Middleware
# (旧 nginx.ingress.kubernetes.io/auth-url + auth-method の置換)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: diode-auth-introspect
  namespace: netbox-diode
spec:
  forwardAuth:
    address: http://netbox-diode-auth.netbox-diode.svc.cluster.local:8080/introspect
---
# /diode/<rest> を /<rest> に書き換える Middleware (gRPC ルート用)
# 例: /diode/diode.v1.IngesterService/Ingest -> /diode.v1.IngesterService/Ingest
# (旧 nginx.ingress.kubernetes.io/rewrite-target: /$1 + regex path の置換)
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: diode-strip-prefix
  namespace: netbox-diode
spec:
  replacePathRegex:
    regex: ^/diode/(.*)
    replacement: /$1
---
# /diode/auth/<rest> を /<rest> に書き換える Middleware (auth ルート用)
# diode-auth サービスは /auth/ プレフィックスなしでエンドポイントを公開している
# (例: /token, /introspect) ため /diode/auth/ をまとめて剥がす必要がある。
# 旧 nginx ingress では path: /diode/auth/(.*) + rewrite-target: /$1 で同じ挙動だった。
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: diode-auth-strip-prefix
  namespace: netbox-diode
spec:
  replacePathRegex:
    regex: ^/diode/auth/(.*)
    replacement: /$1
---
# gRPC IngressRoute (Ingester / Reconciler)
# scheme: h2c で TLS なし HTTP/2 として gRPC バックエンドに転送
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbox-diode-grpc
  namespace: netbox-diode
  annotations:
    # rke2-traefik は --providers.kubernetescrd.ingressClass=traefik で起動しており、
    # この annotation が無い IngressRoute はロードされない (Traefik 側で 404 になる)。
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: PathRegexp(`^/diode/diode\.v1\.IngesterService.*`)
      kind: Rule
      middlewares:
        - name: diode-auth-introspect
        - name: diode-strip-prefix
      services:
        - name: netbox-diode-ingester
          port: 8081
          scheme: h2c
    - match: PathRegexp(`^/diode/diode\.v1\.ReconcilerService.*`)
      kind: Rule
      middlewares:
        - name: diode-auth-introspect
        - name: diode-strip-prefix
      services:
        - name: netbox-diode-reconciler
          port: 8081
          scheme: h2c
---
# HTTP IngressRoute (Auth エンドポイント)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: netbox-diode-http
  namespace: netbox-diode
  annotations:
    # rke2-traefik は --providers.kubernetescrd.ingressClass=traefik で起動しており、
    # この annotation が無い IngressRoute はロードされない (Traefik 側で 404 になる)。
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: PathPrefix(`/diode/auth/`)
      kind: Rule
      middlewares:
        - name: diode-auth-strip-prefix
      services:
        - name: netbox-diode-auth
          port: 8080
