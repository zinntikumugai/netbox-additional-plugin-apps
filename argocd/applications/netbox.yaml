apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: netbox2
  source:
    repoURL: https://charts.netbox.oss.netboxlabs.com/
    chart: netbox
    targetRevision: 7.1.10
    helm:
      releaseName: netbox
      values: |
        global:
          storageClass: truenas-nfs-csi

        # --- 秘密情報は existingSecret 経由（パブリックリポジトリのため実値を保持しない）---
        # netbox-app-secret のキー: secret_key / ldap_bind_password / email_password
        #   （secrets-templates/netbox-app-secret.yaml.example から手動 apply）
        existingSecret: "netbox-app-secret"

        # superuser 認証情報も同じ Secret から読む（username/email/password/api_token キー）
        superuser:
          existingSecret: "netbox-app-secret"

        # --- NetBox コンテナ（プラグインを内包したカスタムイメージを推奨） ---
        image:
          # 例：あなたのレジストリのカスタムイメージ
          registry: ghcr.io
          # repository: netbox-community/netbox
          repository: zinntikumugai/netbox-custom
          tag: "latest"
          pullPolicy: Always
        
        plugins:
          - netbox_diode_plugin
          - netbox_bgp
        pluginsConfig:
          netbox_diode_plugin:
            diode_target_override: "grpc://netbox-diode-ingress.netbox-diode.svc.cluster.local:80/diode"
            diode_username: "diode"
            netbox_to_diode_client_secret: "0123456789"
          netbox_bgp:
            device_ext_page: "right"
            top_level_menu: false

        # --- パフォーマンス設定（OOMKilled対策） ---
        # Unitワーカープロセス数を制限
        unitConfig:
          processes: 2
          max_requests: 500
          
        # データベース接続プールを最適化
        extraConfig:
          - secret:
              secretName: netbox-env-config
              items:
                - key: DB_CONN_MAX_AGE
                  path: db_conn_max_age.py

        # --- LDAP認証設定 ---
        # 注意: ldap_bind_password は existingSecret "netbox-app-secret" から読み込まれます。
        # 更新するには secrets-templates/netbox-app-secret.yaml.example を編集して
        #   kubectl apply -f <filled>.yaml -n netbox2
        # を実行し、その後 NetBox Deployment / worker を rollout restart してください。
        remoteAuth:
          enabled: true
          backends:
            - netbox.authentication.LDAPBackend
          autoCreateUser: true
          autoCreateGroups: false
          defaultGroups: []
          groupSyncEnabled: true
          superuserGroups: []
          staffGroups: []

          ldap:
            # LDAPサーバー設定（環境に合わせて変更してください）
            serverUri: "ldap.service.z1n.in:389"
            startTls: false
            ignoreCertErrors: false

            # Bind認証情報
            # bindPassword は existingSecret "netbox-app-secret" の ldap_bind_password キーから読み込み
            bindDn: "cn=admin,dc=zin3,dc=cc"

            # ユーザー検索設定
            userSearchBaseDn: "OU=people,DC=zin3,DC=cc"
            # userSearchAttr: "sAMAccountName"  # Active Directoryの場合
            userDnTemplate: "uid=%(user)s,ou=people,dc=zin3,dc=cc"  # 固定DN形式の場合

            # グループ検索設定
            groupSearchBaseDn: "DC=zin3,DC=cc"
            groupSearchClass: "(objectClass=groupOfNames)"  # Active Directoryの場合
            groupType: "GroupOfNamesType"

            # 権限マッピング（必要に応じてコメント解除して設定）
            # requireGroupDn: ["CN=NetBox Users,OU=Groups,DC=example,DC=com"]
            # isAdminDn: ["CN=NetBox Admins,OU=Groups,DC=example,DC=com"]
            # isSuperUserDn: ["CN=NetBox SuperUsers,OU=Groups,DC=example,DC=com"]

            # グループ同期設定
            findGroupPerms: true
            mirrorGroups: true
            mirrorGroupsExcept: []
            cacheTimeout: 3600

            # 属性マッピング
            attrFirstName: "givenName"
            attrLastName: "sn"
            attrMail: "mail"

        # --- NetBoxコンテナのリソース設定 ---
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 1500m
            memory: 2Gi

        # --- Worker設定 ---
        worker:
          enabled: true
          replicaCount: 1
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi

        # --- Housekeeping設定 ---
        housekeeping:
          enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi

        # --- PostgreSQL subchart設定（PDB重複回避） ---
        postgresql:
          enabled: true
          # 固有ラベルを全リソースに付与
          commonLabels:
            app.z1n.in/stack: netbox
          # 既存Secretからパスワードを読み込む
          auth:
            existingSecret: "netbox-postgresql-auth"
            secretKeys:
              adminPasswordKey: "postgres-password"
              userPasswordKey: "password"
          primary:
            # Podにも固有ラベルを付与
            podLabels:
              app.z1n.in/stack: netbox
              app.z1n.in/component: postgresql
            resources:
              requests:
                cpu: 100m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            # Helmチャートのデフォルトサービスを無効化
            service:
              enabled: false
          # PDB設定（セレクタに固有ラベルを追加）
          pdb:
            create: true
            minAvailable: 1

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
