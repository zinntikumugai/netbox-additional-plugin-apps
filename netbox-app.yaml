apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: 'netbox-git'
spec:
  project: default
  source:
    repoURL: https://github.com/zinntikumugai/netbox-additional-plugin-apps.git
    path: argocd/applications
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: netbox2
  syncPolicy:
    # push だけで argocd/applications/ 配下を完全自動デプロイする。
    # prune: true のため、git から削除したマニフェストはクラスタからも削除される。
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
